name: Sell Stock
description: Sell shares you own to lock in profits or cut losses
title: "SELL <ticker> <quantity>"
labels: ["trade"]
body:
  - type: markdown
    attributes:
      value: |
        ## Sell Stock

        Selling converts your shares back into cash at the current market price. Sell when you want to lock in a profit or cut your losses before a price drops further.

        ### How to place your order

        Edit the **title** above:
        - Replace `<ticker>` with the ticker of a stock you currently own
        - Replace `<quantity>` with the number of shares to sell (you cannot sell more than you hold)

        **Example title:** `SELL react 5`

        Then click **Submit new issue** — your trade executes automatically.

        ---

        ### Available Tickers & Current Prices

        | Ticker | Repository | Price |
