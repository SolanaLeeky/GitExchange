        | `autoresearch` | karpathy/autoresearch | $238.83 |
        | `paperclip` | paperclipai/paperclip | $216.43 |
        | `gstack` | garrytan/gstack | $216.10 |
        | `cli` | googleworkspace/cli | $201.38 |

        > Prices change as GitHub activity shifts. Check the [Market Dashboard](https://solanaleaky.github.io/GitExchange/) for live data.

        ---

        ### Tips

        - **Check your portfolio first** — use the "View Portfolio" template to see what you hold.
        - **Partial sells are fine** — you don't have to sell all your shares at once.
        - Your profit/loss is calculated as `(sell price - buy price) x quantity`.
        - There is no penalty for selling — it simply returns cash to your balance.
