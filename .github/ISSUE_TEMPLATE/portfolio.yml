name: View Portfolio
description: See your holdings, cash balance, P&L, and achievements — read-only, no risk
title: "PORTFOLIO"
labels: ["portfolio"]
body:
  - type: markdown
    attributes:
      value: |
        ## View Your Portfolio

        This is a **read-only** action. It does not place any trades, spend any cash, or change your positions in any way. There is **zero risk** — you are simply requesting a snapshot of your account.

        ### How to use

        **No edits needed.** Just click **Submit new issue** and a comment will appear with your full portfolio summary.

        ---

        ### What you will see

        - **Cash balance** — how much cash you have available to trade
        - **Portfolio value** — total value of all your holdings at current market prices
        - **Stock holdings** — every stock you own, with quantity, average cost, current price, and per-stock P&L
        - **Short positions** — any open shorts, with entry price and unrealized P&L
        - **Achievements** — badges you have earned through trading milestones

        ---

