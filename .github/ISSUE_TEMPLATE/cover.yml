name: Cover Short
description: Close a short position — buy back borrowed shares to settle P&L
title: "COVER deno 10"
labels: ["trade"]
body:
  - type: markdown
    attributes:
      value: |
        ## Cover a Short Position

        Covering closes an existing short position. You buy back the shares you previously borrowed at the current market price. If the price dropped since you shorted, you profit. If it rose, you take a loss.

        ### How to place your order

        Edit the **title** above:
        - Replace `<ticker>` with the ticker of a stock you are currently short on
        - Replace `<quantity>` with the number of shares to cover (cannot exceed your short position size)

        **Example title:** `COVER deno 20`

        Then click **Submit new issue** — your trade executes automatically and your P&L is settled.

