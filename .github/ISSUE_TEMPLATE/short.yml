        ## Short Sell a Stock

        Short selling lets you profit when a stock's price goes **down**. You borrow shares and sell them at today's price, then later buy them back (cover) at a lower price to pocket the difference.

        ### How to place your order

        Edit the **title** above:
        - Replace `<ticker>` with the ticker you want to short
        - Replace `<quantity>` with the number of shares to short (whole numbers only)

        **Example title:** `SHORT deno 20`

        Then click **Submit new issue** — your trade executes automatically.

        ---

