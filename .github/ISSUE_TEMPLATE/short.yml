        ---

        ### Risk Warnings

        - **Losses can exceed your margin if the price spikes.** Unlike buying (where you can only lose what you paid), short losses are theoretically unlimited because there is no cap on how high a price can go.
        - **150% margin required** — you must have 1.5x the short value in your account as collateral.
        - **Short squeeze danger** — if short interest on a stock exceeds 60% and the price rises 10%+, a short squeeze triggers and your position is **force-closed** at the current (higher) price.

        ### Tips

        - **Start with small positions** — try shorting just 1-2 shares until you understand the mechanics.
        - Short selling is an advanced strategy. If you are new, consider buying first.
        - Use `COVER` to close your short position and settle your profit or loss.
        - Watch for trending repos — a sudden spike in GitHub stars can drive prices up fast, hurting short sellers.
